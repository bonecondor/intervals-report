name: tick

on:
  schedule:
    # every 30 min at odd minutes — GitHub drops many scheduled runs under
    # load, so we oversample; tick.py's odds are tuned for this cadence
    - cron: "13,43 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "post one burst right now (yes/no)"
        required: false
        default: "no"

permissions:
  contents: write

concurrency:
  group: tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: tick
        run: python3 tick.py ${{ github.event.inputs.force == 'yes' && '--force' || '' }}
      - name: build
        run: python3 build.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts docs
          if ! git diff --cached --quiet; then
            git commit -m "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase
            git push
          fi
